[pytest]
testpaths = tests
markers =
    integration: integration tests that exercise the HTTP layer end-to-end
    live: tests that boot the real sibling oraculo_api service
filterwarnings =
    ignore:Core Pydantic V1 functionality isn't compatible with Python 3.14 or greater.:UserWarning
    ignore:.*_UnionGenericAlias.*:DeprecationWarning
    ignore:.*asyncio.iscoroutinefunction.*:DeprecationWarning
